name: Build Apps

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_PUBLIC_DB_URL: ${{ secrets.NEXT_PUBLIC_DB_URL }}
          NEXT_PUBLIC_DB_KEY: ${{ secrets.NEXT_PUBLIC_DB_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Импульс ${{ github.ref_name }}"
          releaseBody: "Новая версия мессенджера Импульс."
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web
        env:
          NEXT_PUBLIC_DB_URL: ${{ secrets.NEXT_PUBLIC_DB_URL }}
          NEXT_PUBLIC_DB_KEY: ${{ secrets.NEXT_PUBLIC_DB_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bun run build:pages

      - name: Setup Capacitor
        run: |
          bun add -d @capacitor/cli
          bun add @capacitor/core @capacitor/android @capacitor/splash-screen @capacitor/push-notifications
          cp capacitor/capacitor.config.ts ./capacitor.config.ts
          npx cap add android
          npx cap sync

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Sign APK
        working-directory: android
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks release.keystore \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --key-pass "pass:$KEY_PASSWORD" \
            --out app-release-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app-release-signed.apk
          name: "Импульс ${{ github.ref_name }}"
          body: "Новая версия мессенджера Импульс."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
