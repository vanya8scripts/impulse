name: Build Apps

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - name: Install bun deps
        run: bun install --frozen-lockfile
      - name: Install tauri CLI
        run: cargo install tauri-cli --version "^2.0.0" --locked
      - name: Build Tauri app
        env:
          NEXT_PUBLIC_DB_URL: ${{ secrets.NEXT_PUBLIC_DB_URL }}
          NEXT_PUBLIC_DB_KEY: ${{ secrets.NEXT_PUBLIC_DB_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: cargo tauri build --target x86_64-pc-windows-msvc
      - name: Upload EXE to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          name: "Импульс ${{ github.ref_name }}"
          body: "Импульс — мессенджер. Версия ${{ github.ref_name }}."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
      - uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools build-tools;34.0.0 platforms;android-34"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web
        env:
          NEXT_PUBLIC_DB_URL: ${{ secrets.NEXT_PUBLIC_DB_URL }}
          NEXT_PUBLIC_DB_KEY: ${{ secrets.NEXT_PUBLIC_DB_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bun run build:pages

      - name: Setup Capacitor
        run: |
          bun add -d @capacitor/cli
          bun add @capacitor/core @capacitor/android @capacitor/splash-screen
          cp capacitor/capacitor.config.ts ./capacitor.config.ts
          npx cap add android
          npx cap copy android
          npx cap sync android

      - name: Build APK debug
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/impulse.keystore
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks /tmp/impulse.keystore \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --key-pass "pass:$KEY_PASSWORD" \
            --out /tmp/impulse-signed.apk \
            android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/impulse-signed.apk
          name: "Импульс ${{ github.ref_name }}"
          body: "Импульс — мессенджер. Версия ${{ github.ref_name }}."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
