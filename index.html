<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Импульс</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><path d=%22M13 2L4.5 14H11L10 22L19.5 9.5H13L13 2Z%22 fill=%22%238b5cf6%22/></svg>">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="screen-root">
  <div class="loading-screen" id="boot-loading">
    <span class="icn">SPINNER</span>
    <div>Импульс запускается</div>
  </div>
</div>

<template id="tpl-auth">
  <div class="auth-screen">
    <div class="auth-card">
      <div class="brand">
        <div class="brand-mark" id="brand-icon"></div>
        <div class="brand-name">Импульс</div>
      </div>
      <div class="auth-sub">Мессенджер для тех, кто на связи</div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Вход</button>
        <button class="auth-tab" data-tab="register">Регистрация</button>
      </div>

      <form id="form-login">
        <div class="field">
          <label>Юзернейм</label>
          <input type="text" id="login-username" autocomplete="username" placeholder="vanya" required>
        </div>
        <div class="field">
          <label>Пароль</label>
          <input type="password" id="login-password" autocomplete="current-password" placeholder="••••••••" required>
        </div>
        <div class="field-error" id="login-error"></div>
        <button type="submit" class="btn-primary" id="login-submit">Войти</button>
      </form>

      <form id="form-register" class="hidden">
        <div class="avatar-picker">
          <label class="avatar-upload" id="register-avatar-wrap">
            <div class="avatar" id="register-avatar-preview">ICON_CAMERA</div>
            <div class="avatar-upload-overlay">ICON_CAMERA</div>
            <input type="file" accept="image/*" id="register-avatar-input" class="hidden">
            <div class="avatar-upload-badge">ICON_CAMERA_SMALL</div>
          </label>
          <div class="avatar-picker-hint">Добавить фото профиля</div>
        </div>
        <div class="field">
          <label>Имя</label>
          <input type="text" id="register-name" placeholder="Ваня" required maxlength="40">
        </div>
        <div class="field">
          <label>Юзернейм</label>
          <input type="text" id="register-username" placeholder="vanya" required maxlength="24" pattern="[a-zA-Z0-9_]+">
          <div class="field-hint">Только латиница, цифры и подчёркивание. По нему вас найдут другие.</div>
        </div>
        <div class="field">
          <label>Пароль</label>
          <input type="password" id="register-password" placeholder="Минимум 6 символов" required minlength="6">
        </div>
        <div class="field-error" id="register-error"></div>
        <button type="submit" class="btn-primary" id="register-submit">Создать аккаунт</button>
      </form>
    </div>
  </div>
</template>

<template id="tpl-app">
  <div class="app-shell">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="brand">
          <div class="brand-mark" id="app-brand-icon"></div>
          <div class="brand-name">Импульс</div>
        </div>
        <div class="sidebar-actions">
          <button class="icon-btn" id="btn-open-settings" title="Настройки" aria-label="Настройки">ICON_SETTINGS</button>
        </div>
      </div>
      <div class="search-bar">
        <span class="icn">ICON_SEARCH</span>
        <input type="text" id="user-search" placeholder="Найти по юзернейму">
      </div>
      <div class="search-results hidden" id="search-results"></div>
      <div class="chat-list" id="chat-list"></div>
    </div>

    <div class="chat-panel" id="chat-panel">
      <div class="empty-state" id="chat-empty">
        <span class="icn">ICON_PULSE</span>
        <div class="empty-state-title">Выберите чат</div>
        <div class="empty-state-sub">Найдите собеседника по юзернейму слева или откройте существующую переписку</div>
      </div>

      <div class="hidden" id="chat-active-wrap" style="display:contents">
        <div class="chat-header">
          <button class="icon-btn chat-back-btn" id="btn-chat-back">ICON_BACK</button>
          <div class="avatar" id="chat-header-avatar"></div>
          <div class="chat-header-info">
            <div class="chat-header-name" id="chat-header-name"></div>
            <div class="chat-header-status">
              <span class="status-dot" id="chat-header-dot"></span>
              <span id="chat-header-status-text">не в сети</span>
            </div>
          </div>
          <div class="chat-header-actions">
            <button class="icon-btn" id="btn-call-audio" title="Аудиозвонок">ICON_PHONE</button>
            <button class="icon-btn" id="btn-call-video" title="Видеозвонок">ICON_VIDEO</button>
          </div>
        </div>

        <div class="messages" id="messages"></div>

        <div class="composer">
          <div class="emoji-panel hidden" id="emoji-panel"></div>
          <div class="composer-inner" id="composer-inner">
            <button class="icon-btn" id="btn-attach" title="Прикрепить файл">ICON_ATTACH</button>
            <input type="file" id="file-input" class="hidden">
            <textarea id="message-input" placeholder="Сообщение" rows="1"></textarea>
            <div class="composer-actions" id="composer-actions">
              <button class="icon-btn" id="btn-emoji" title="Эмодзи">ICON_SMILE</button>
              <button class="icon-btn" id="btn-voice" title="Голосовое сообщение">ICON_MIC</button>
              <button class="icon-btn" id="btn-send" title="Отправить">ICON_SEND</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</template>

<script src="js/icons.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/app.js"></script>
</body>
</html>
